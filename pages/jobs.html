<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Jobs - SiraLink</title><link rel="icon"
href="../assets/images/branding/favicon.png"><link rel="stylesheet"
href="../assets/css/dashboard.css"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:90px;
}

.header{
background:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
height:45px;
}

.banner{
margin:15px;
border-radius:20px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.banner img{
width:100%;
display:block;
}

.search-box{
padding:0 15px;
margin-bottom:15px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:15px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.08);
outline:none;
}

.filters{
display:flex;
gap:10px;
overflow-x:auto;
padding:0 15px 15px;
}

.filters button{
border:none;
padding:10px 16px;
border-radius:20px;
background:white;
cursor:pointer;
white-space:nowrap;
font-weight:bold;
color:#0A3D91;
}

.filters button:hover{
background:#0A3D91;
color:white;
}

#jobsContainer{
padding:15px;
display:grid;
gap:15px;
}

.job-card{
background:white;
border-radius:20px;
padding:18px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.company-logo{
width:60px;
height:60px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}

.job-card h3{
margin-bottom:8px;
color:#222;
}

.job-card p{
margin:6px 0;
color:#666;
font-size:14px;
}

.job-card button{
margin-top:12px;
width:100%;
border:none;
background:#0A3D91;
color:white;
padding:12px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.job-card button:hover{
opacity:.9;
}

.loading{
background:white;
padding:20px;
border-radius:20px;
text-align:center;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.bottom-nav a{
text-decoration:none;
color:#0A3D91;
font-size:14px;
font-weight:bold;
}

.active-nav{
color:#0088cc;
}

</style></head><body><header class="header"><img
src="../assets/images/branding/logo.png"
class="logo"
alt="SiraLink">

</header><section class="banner"><img
src="../assets/images/banners/jobs-banner.jpg"
alt="Jobs Banner">

</section><div class="search-box"><input
type="text"
id="searchInput"
placeholder="Search jobs, companies, locations...">

</div><div class="filters"><button>All Jobs</button>
<button>IT</button>
<button>Finance</button>
<button>Engineering</button>
<button>Marketing</button>
<button>Remote</button>

</div><div id="jobsContainer"><div class="loading">Loading jobs...

</div></div><nav class="bottom-nav"><a href="home.html">
🏠 Home
</a><a
href="jobs.html"
class="active-nav">
💼 Jobs
</a>

<a href="profile.html">
👤 Profile
</a><a href="about.html">
ℹ️ About
</a></nav><script type="module"
src="../js/jobs/jobs.js">
</script></body></html>
