<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Details - SiraLink</title>
<link rel="icon" href="../assets/images/branding/favicon.png">
<link rel="stylesheet" href="../assets/css/dashboard.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:100px;
}

.header{
background:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 10px rgba(0,0,0,.08);
position:sticky;
top:0;
z-index:100;
}

.back-btn{
text-decoration:none;
color:#0A3D91;
font-weight:bold;
font-size:15px;
}

.logo{
height:45px;
}

.banner{
margin:15px;
border-radius:20px;
overflow:hidden;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.banner img{
width:100%;
display:block;
}

#jobDetail{
padding:15px;
}

.job-card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

.company-logo{
width:80px;
height:80px;
border-radius:15px;
object-fit:cover;
margin-bottom:15px;
}

.job-title{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
color:#222;
}

.company-name{
font-size:18px;
color:#0A3D91;
margin-bottom:15px;
}

.job-meta{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.badge{
background:#eef3ff;
color:#0A3D91;
padding:8px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.section{
margin-top:20px;
}

.section h3{
color:#0A3D91;
margin-bottom:10px;
}

.section p{
line-height:1.7;
color:#444;
}

.loading{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
}

.job-actions{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:15px;
display:flex;
gap:10px;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.job-actions button{
flex:1;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:14px;
}

#applyBtn{
background:#0A3D91;
color:white;
}

#saveBtn{
background:#eef3ff;
color:#0A3D91;
}

#shareBtn{
background:#0088cc;
color:white;
}

</style>
</head>
<body>

<header class="header">
<a href="jobs.html" class="back-btn">
← Back
</a>
<img src="../assets/images/branding/logo.png" class="logo" alt="SiraLink">
</header>

<section class="banner">
<img src="../assets/images/banners/jobs-banner.jpg" alt="Jobs Banner">
</section>

<div id="jobDetail">
<div class="loading">Loading job details...</div>
</div>

<div class="job-actions">
<button id="applyBtn">Apply Now</button>
<button id="saveBtn">Save Job</button>
<button id="shareBtn">Share</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script type="module" src="../js/config/supabase.js"></script>
<script src="../js/services/users-service.js"></script>
<script src="../js/services/saved-jobs-service.js"></script>
<script src="../js/services/notifications-service.js"></script>
<script type="module" src="../js/jobs/job-detail.js"></script>

</body>
</html>
