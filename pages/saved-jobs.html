<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0"><title>Saved Jobs - SiraLink</title><link rel="icon"
href="../assets/images/branding/favicon.png"><link rel="stylesheet"
href="../assets/css/main.css"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:90px;
}

.header{
background:#0A3D91;
color:white;
padding:20px;
}

.container{
padding:15px;
}

.job-card{
background:white;
padding:18px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.company{
color:#666;
font-size:13px;
margin-bottom:6px;
}

.job-title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.details{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.tag{
background:#eef4ff;
color:#0A3D91;
padding:6px 12px;
border-radius:20px;
font-size:13px;
}

.actions{
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.apply-btn{
background:#0A3D91;
color:white;
}

.remove-btn{
background:#f1f1f1;
}

.empty-state{
display:none;
text-align:center;
padding:60px 20px;
color:#666;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.bottom-nav a{
text-decoration:none;
color:#0A3D91;
font-weight:bold;
}

</style></head><body><div class="header"><h1>💾 Saved Jobs</h1><p>Your bookmarked opportunities</p></div><div
class="container"
id="jobsContainer"></div><div
class="empty-state"
id="emptyState"><h2>No Saved Jobs</h2><p>
You haven't saved any jobs yet.
</p></div><div class="bottom-nav"><a href="home.html">
Home
</a><a href="jobs.html">
Jobs
</a><a href="saved-jobs.html">
Saved
</a><a href="profile.html">
Profile
</a></div><script>

const container =
document.getElementById(
"jobsContainer"
);

const emptyState =
document.getElementById(
"emptyState"
);

function loadSavedJobs(){

const savedJobs = [];

for(let i=0;i<localStorage.length;i++){

const key =
localStorage.key(i);

if(
key.startsWith(
"saved_job_"
)
){

savedJobs.push(
JSON.parse(
localStorage.getItem(key)
)
);

}

}

if(savedJobs.length===0){

emptyState.style.display =
"block";

return;

}

savedJobs.forEach(job=>{

container.innerHTML += `

<div class="job-card">

<div class="company">
${job.company_name || "Company"}
</div>

<div class="job-title">
${job.title}
</div>

<div class="details">

<span class="tag">
${job.location || "N/A"}
</span>

<span class="tag">
${job.education_level || "N/A"}
</span>

<span class="tag">
${job.salary || "Negotiable"}
</span>

</div>

<div class="actions">

<button
class="btn apply-btn"
onclick="
location.href=
'job-detail.html?id=${job.id}'
">

View Job

</button>

<button
class="btn remove-btn"
onclick="
removeJob('${job.id}')
">

Remove

</button>

</div>

</div>

`;

});

}

function removeJob(id){

localStorage.removeItem(
`saved_job_${id}`
);

location.reload();

}

loadSavedJobs();

</script></body></html>
