<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications - SiraLink</title>
<link rel="icon" href="../assets/images/branding/favicon.png">
<link rel="stylesheet" href="../assets/css/main.css">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:90px;
}

.header{
background:#0A3D91;
color:white;
padding:20px;
text-align:center;
}

.logo{
height:50px;
margin-bottom:10px;
}

.header h1{
font-size:24px;
margin-bottom:5px;
}

.counter{
background:white;
color:#0A3D91;
display:inline-block;
padding:5px 12px;
border-radius:20px;
font-size:13px;
font-weight:bold;
}

.actions{
padding:15px;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#0A3D91;
color:white;
font-weight:bold;
cursor:pointer;
}

.notification-container{
padding:15px;
}

.notification-card{
background:white;
padding:15px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
display:flex;
gap:15px;
align-items:flex-start;
}

.unread{
border-left:5px solid #0A3D91;
}

.icon{
width:50px;
height:50px;
border-radius:50%;
background:#eef4ff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.notification-content{
flex:1;
}

.notification-title{
font-size:16px;
font-weight:bold;
margin-bottom:5px;
}

.notification-message{
font-size:14px;
color:#666;
line-height:1.5;
}

.notification-time{
font-size:12px;
color:#999;
margin-top:8px;
}

.empty{
display:none;
text-align:center;
padding:60px 20px;
color:#777;
}

.empty h2{
margin-bottom:10px;
}

.bottom-nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

.bottom-nav a{
text-decoration:none;
color:#0A3D91;
font-size:14px;
font-weight:bold;
}

.active-nav{
color:#0088cc;
}

.loading{
text-align:center;
padding:20px;
color:#666;
}

</style>
</head>
<body>

<div class="header">
    <img src="../assets/images/branding/logo-white.png" class="logo" alt="SiraLink">
    <h1>🔔 Notifications</h1>
    <div class="counter" id="counter">0 Unread</div>
</div>

<div class="actions">
    <button class="btn" id="markAllBtn">Mark All as Read</button>
</div>

<div class="notification-container" id="notificationList">
    <div class="loading">Loading notifications...</div>
</div>

<div class="empty" id="emptyState">
    <h2>No Notifications</h2>
    <p>You're all caught up.</p>
</div>

<div class="bottom-nav">
    <a href="home.html">🏠 Home</a>
    <a href="jobs.html">💼 Jobs</a>
    <a href="notifications.html" class="active-nav">🔔 Alerts</a>
    <a href="profile.html">👤 Profile</a>
</div>

<script src="../js/services/users-service.js"></script>
<script src="../js/services/notifications-service.js"></script>
<script src="../js/notifications/notifications.js"></script>

</body>
</html>
