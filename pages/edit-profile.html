<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Profile - SiraLink</title>

<link rel="stylesheet" href="../assets/css/main.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
padding-bottom:30px;
}

.header{
background:#0A3D91;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:15px;
max-width:800px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:18px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.card h2{
margin-bottom:15px;
color:#0A3D91;
}

.profile-image-section{
text-align:center;
margin-bottom:20px;
}

.profile-image{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #0A3D91;
background:#eee;
}

.upload-label{
display:inline-block;
margin-top:10px;
padding:10px 16px;
background:#eef4ff;
color:#0A3D91;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

input[type="file"]{
display:none;
}

.form-group{
margin-bottom:15px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:bold;
color:#333;
}

.form-group input,
.form-group select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-size:14px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.cv-box{
padding:15px;
background:#f8faff;
border-radius:12px;
text-align:center;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
font-size:15px;
}

.primary{
background:#0A3D91;
color:white;
}

.secondary{
background:#eef4ff;
color:#0A3D91;
margin-top:10px;
}

.success{
display:none;
padding:12px;
background:#d4edda;
color:#155724;
border-radius:10px;
margin-bottom:15px;
}

@media(max-width:768px){

.row{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="header">
<h1>Edit Profile</h1>
</div>

<div class="container">

<div
class="success"
id="successMessage">

Profile Updated Successfully

</div>

<div class="card">

<div class="profile-image-section">

<img
id="profilePreview"
class="profile-image"
src="../assets/images/default-avatar.png"
alt="Profile">

<br>

<label
for="profilePicture"
class="upload-label">

📷 Change Photo

</label>

<input
type="file"
id="profilePicture"
accept="image/*">

</div>

</div>

<form id="editProfileForm">

<div class="card">

<h2>Personal Information</h2>

<div class="form-group">

<label>Full Name</label>

<input
type="text"
id="fullName">

</div>

<div class="row">

<div class="form-group">

<label>Email</label>

<input
type="email"
id="email">

</div>

<div class="form-group">

<label>Phone</label>

<input
type="text"
id="phone">

</div>

</div>

<div class="row">

<div class="form-group">

<label>Gender</label>

<select id="gender">

<option value="">
Select Gender
</option>

<option value="Male">
Male
</option>

<option value="Female">
Female
</option>

</select>

</div>

<div class="form-group">

<label>Location</label>

<input
type="text"
id="location">

</div>

</div>

</div>

<div class="card">

<h2>Professional Information</h2>

<div class="row">

<div class="form-group">

<label>Department</label>

<input
type="text"
id="department">

</div>

<div class="form-group">

<label>Education Level</label>

<input
type="text"
id="educationLevel">

</div>

</div>

<div class="form-group">

<label>Experience Years</label>

<input
type="number"
id="experienceYears"
min="0">

</div>

</div>

<div class="card">

<h2>CV Upload</h2>

<div class="cv-box">

<p id="cvFileName">

No CV Uploaded

</p>

<br>

<label
for="cvFile"
class="upload-label">

📄 Upload CV

</label>

<input
type="file"
id="cvFile"
accept=".pdf,.doc,.docx">

</div>

</div>

<button
type="submit"
class="btn primary">

💾 Save Changes

</button>

<button
type="button"
class="btn secondary"
onclick="history.back()">

← Back

</button>

</form>

</div>

<script
type="module"
src="../js/profile/edit-profile.js">
</script>

</body>
</html>
