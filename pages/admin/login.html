<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SiraLink Admin Login</title><link rel="icon"
type="image/png"
href="../../assets/images/branding/favicon.png"><link rel="stylesheet"
href="../../assets/css/admin.css"><style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:100%;
    max-width:400px;
    background:#1e293b;
    padding:30px;
    border-radius:16px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.logo{
    width:90px;
    margin-bottom:15px;
}

h1{
    margin-bottom:5px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.footer{
    margin-top:20px;
    color:#94a3b8;
    font-size:13px;
}

</style></head><body><div class="login-container"><img
src="../../assets/images/branding/logo.png"
alt="SiraLink Logo"
class="logo">

<h1>SiraLink</h1><p class="subtitle">
Admin Dashboard Login
</p><input
type="password"
id="password"
placeholder="Enter Admin Password">

<button id="loginBtn">
Login
</button><div class="footer">
© 2026 SiraLink
</div></div><script type="module"
src="../../js/admin/login.js">
</script></body>
</html>
